name: RevOps Data Ingestion

on:
  schedule:
    # Runs at 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual triggering from the GitHub Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run data ingestion
      env:
        HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        MIXPANEL_PROJECT_TOKEN: ${{ secrets.MIXPANEL_PROJECT_TOKEN }}
        MIXPANEL_API_SECRET: ${{ secrets.MIXPANEL_API_SECRET }}
        POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
        FRESHDESK_DOMAIN: ${{ secrets.FRESHDESK_DOMAIN }}
        FRESHDESK_API_KEY: ${{ secrets.FRESHDESK_API_KEY }}
        META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        META_ACCOUNT_ID: ${{ secrets.META_ACCOUNT_ID }}
      run: python main_revops_writer.py --all
